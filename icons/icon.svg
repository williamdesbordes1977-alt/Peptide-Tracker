<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <g transform="translate(256,256)">
    <!-- Syringe body -->
    <rect x="-20" y="-140" width="40" height="200" rx="6" fill="#3b82f6"/>
    <rect x="-28" y="-140" width="56" height="12" rx="4" fill="#60a5fa"/>
    <rect x="-28" y="48" width="56" height="12" rx="4" fill="#60a5fa"/>
