    <rect x="-4" y="60" width="8" height="80" rx="2" fill="#94a3b8"/>
    <polygon points="-4,140 4,140 0,160" fill="#94a3b8"/>
    <!-- Plunger -->
    <rect x="-8" y="-180" width="16" height="48" rx="4" fill="#64748b"/>
    <rect x="-16" y="-184" width="32" height="8" rx="4" fill="#94a3b8"/>
    <!-- Measurement lines -->
    <rect x="20" y="-120" width="12" height="2" fill="#1e293b"/>
