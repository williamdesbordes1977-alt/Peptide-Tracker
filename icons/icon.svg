    <rect x="20" y="-60" width="12" height="2" fill="#1e293b"/>
    <rect x="20" y="-30" width="12" height="2" fill="#1e293b"/>
    <rect x="20" y="0" width="12" height="2" fill="#1e293b"/>
    <rect x="20" y="30" width="12" height="2" fill="#1e293b"/>
    <!-- Liquid fill -->
